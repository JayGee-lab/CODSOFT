<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase E-Commerce</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f4f4;
}

/* HEADER */

header{
background:#1e88e5;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
}

nav button{
padding:10px 15px;
border:none;
background:white;
color:#1e88e5;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

/* AUTH */

.auth-container{
width:350px;
background:white;
padding:20px;
margin:30px auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.auth-container h2{
margin-bottom:15px;
text-align:center;
}

.auth-container input{
width:100%;
padding:10px;
margin:8px 0;
}

.auth-container button{
width:100%;
padding:10px;
background:#1e88e5;
color:white;
border:none;
cursor:pointer;
}

/* FILTER */

.filters{
padding:20px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:10px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.product h3{
margin:10px 0;
}

.product p{
margin:10px 0;
font-weight:bold;
}

.product button{
background:#1e88e5;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

/* CART */

.cart{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 10px rgba(0,0,0,.3);
padding:20px;
transition:.4s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.checkout-btn{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

/* CHECKOUT */

.checkout{
display:none;
padding:20px;
max-width:500px;
margin:auto;
background:white;
border-radius:10px;
margin-top:20px;
}

.checkout input{
width:100%;
padding:10px;
margin:8px 0;
}

.checkout button{
width:100%;
padding:10px;
background:#1e88e5;
color:white;
border:none;
cursor:pointer;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<header>
<div class="logo">JayGee</div>
<nav>
<button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</nav>
</header>

<!-- LOGIN -->

<div class="auth-container" id="authSection">
<h2>User Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login / Register</button>
</div>

<!-- MAIN SHOP -->

<div id="shop" class="hidden">

<div class="filters">

<input
type="text"
id="search"
placeholder="Search Product"
onkeyup="filterProducts()">

<select id="categoryFilter" onchange="filterProducts()">
<option value="all">All Categories</option>
<option value="Electronics">Electronics</option>
<option value="Fashion">Fashion</option>
<option value="Accessories">Accessories</option>
<option value="Sports">Sports</option>
</select>

</div>

<div class="products" id="products"></div>

</div>

<!-- CART -->

<div class="cart" id="cart">

<h2>Shopping Cart</h2>

<div id="cartItems"></div>

<h3>Total: $<span id="total">0</span></h3>

<button class="checkout-btn" onclick="openCheckout()">
Proceed to Checkout
</button>

</div>

<!-- CHECKOUT -->

<div class="checkout" id="checkout">

<h2>Checkout</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="text" placeholder="Shipping Address">

<input type="text" placeholder="Card Number">

<input type="text" placeholder="MM/YY">

<input type="text" placeholder="CVV">

<button onclick="processPayment()">
Pay Now
</button>

</div>

<script>

const products = [

{
id:1,
name:"Laptop",
price:450,
category:"Electronics",
image:"laptop.png"
},

{
id:2,
name:"Smartphone",
price:250,
category:"Electronics",
image:"phone.png"
},

{
id:3,
name:"Sneakers",
price:70,
category:"Fashion",
image:"sneakers.jpeg"
},

{
id:4,
name:"Watch",
price:150,
category:"Accessories",
image:"watch.jpeg"
},

{
id:5,
name:"Headphones",
price:20,
category:"Electronics",
image:"headphones.png"
},

{
id:6,
name:"Formal Shoes",
price:120,
category:"Fashion",
image:"formal.jpeg"
},

{
id:7,
name:"Nike Sprinting Shoes",
price:45,
category:"Sports",
image:"spikes.png"
},

{
id:8,
name:"Suit",
price:200,
category:"Fashion",
image:"suit.jpeg"
},

{
id:9,
name:"Nike Mecurial",
price:50,
category:"Sports",
image:"nike.png"
},

{
id:10,
name:"Rolex Watch",
price:3500,
category:"Accessories",
image:"rolex.jpeg"
},

{
id:11,
name:"Nike Football",
price:30,
category:"Sports",
image:"ball.png"
},

{
id:12,
name:"Dress",
price:120,
category:"Fashion",
image:"dress.jpeg"
}

];

let cart=[];

/* AUTH */

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user && pass){

localStorage.setItem("user",user);

document.getElementById("authSection").classList.add("hidden");

document.getElementById("shop").classList.remove("hidden");

displayProducts(products);

alert("Login Successful");

}else{
alert("Enter username and password");
}

}

/* PRODUCTS */

function displayProducts(items){

let productDiv=document.getElementById("products");

productDiv.innerHTML="";

items.forEach(product=>{

productDiv.innerHTML+=`

<div class="product">

<img src="${product.image}">

<h3>${product.name}</h3>

<p>$${product.price}</p>

<button onclick="addToCart(${product.id})">
Add to Cart
</button>

</div>

`;

});

}

function filterProducts(){

let search=document.getElementById("search")
.value.toLowerCase();

let category=document.getElementById("categoryFilter")
.value;

let filtered=products.filter(product=>{

let matchName=
product.name.toLowerCase().includes(search);

let matchCategory=
category==="all" ||
product.category===category;

return matchName && matchCategory;

});

displayProducts(filtered);

}

/* CART */

function addToCart(id){

let item=products.find(p=>p.id===id);

cart.push(item);

updateCart();

}

function updateCart(){

let cartItems=document.getElementById("cartItems");

cartItems.innerHTML="";

let total=0;

cart.forEach(item=>{

total+=item.price;

cartItems.innerHTML+=`

<div class="cart-item">

<span>${item.name}</span>

<span>$${item.price}</span>

</div>

`;

});

document.getElementById("total").innerText=total;

document.getElementById("cartCount").innerText=cart.length;

}

function toggleCart(){

document.getElementById("cart")
.classList.toggle("active");

}

/* CHECKOUT */

function openCheckout(){

document.getElementById("checkout")
.style.display="block";

}

function processPayment(){

alert("Payment Successful!");

cart=[];

updateCart();

document.getElementById("checkout")
.style.display="none";

document.getElementById("cart")
.classList.remove("active");

}

window.onload=()=>{

let user=localStorage.getItem("user");

if(user){

document.getElementById("authSection")
.classList.add("hidden");

document.getElementById("shop")
.classList.remove("hidden");

displayProducts(products);

}

}

</script>

</body>
</html>
